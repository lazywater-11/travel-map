        let map;
        let activeMarkers = {};
        let currentFilter = 'all';
        let searchQuery = '';
        let lightTileLayer, darkTileLayer;

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            initThemeIcon();
            renderPlaces();
            
            // Listen for system theme changes dynamically
            window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
                if (!localStorage.getItem("color-scheme")) {
                    const newTheme = e.matches ? 'dark' : 'light';
                    setTheme(newTheme);
                }
            });
        });

        function initMap() {
            // Center map on Mexico City
            map = L.map('map', {
                zoomControl: true,
                attributionControl: true
            }).setView([19.3880, -99.1700], 11);

            // Set up Map layers
            lightTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
            });

            darkTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://carto.com/">CARTO</a>'
            });

            // Set initial layer based on theme
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            if (currentTheme === 'dark') {
                darkTileLayer.addTo(map);
            } else {
                lightTileLayer.addTo(map);
            }

            // Move zoom controls to top-right
            map.zoomControl.setPosition('topright');
        }

        // Color coding for Marker categories
        function getCategoryColor(cat) {
            switch(cat) {
                case 'quiet': return '#5849d8';
                case 'lawn': return '#4f6f52';
                case 'forest': return '#9d532b';
                case 'culture': return '#c93b3b';
                case 'cafe': return '#8b5a2b';
                default: return '#739072';
            }
        }

        function createMarkers() {
            // Clear existing markers
            Object.values(activeMarkers).forEach(m => map.removeLayer(m));
            activeMarkers = {};

            // Filter places based on search and tab selection
            const filtered = places.filter(p => {
                const matchesTab = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = p.nameZh.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      p.nameEs.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                      p.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSearch;
            });

            // Add markers
            filtered.forEach(p => {
                const color = getCategoryColor(p.category);
                let emoji = '📍';
                if (p.category === 'quiet') emoji = '🎵';
                else if (p.category === 'lawn') emoji = '🧺';
                else if (p.category === 'forest') emoji = '🌲';
                else if (p.category === 'culture') emoji = '🏛️';
                else if (p.category === 'cafe') emoji = '☕';

                // Beautiful Custom SVG Icon Marker
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="custom-pin" id="pin-${p.id}" style="background-color: ${color}; border-color: white;">
                             <span style="font-size: 14px;">${emoji}</span>
                           </div>`,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18],
                    popupAnchor: [0, -18]
                });

                const popupHtml = `
                    <div class="popup-container">
                        <div class="popup-title">${p.nameZh}</div>
                        <div class="popup-es">${p.nameEs}</div>
                        <div class="popup-desc">${p.description}</div>
                        <a href="${p.gmaps}" target="_blank" class="gmaps-btn popup-btn" id="popup-gmaps-${p.id}">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            在 Google Maps 查看
                        </a>
                    </div>
                `;

                const marker = L.marker([p.lat, p.lng], { icon: customIcon })
                    .bindPopup(popupHtml)
                    .addTo(map);

                marker.on('popupopen', () => {
                    selectPlaceCard(p.id, false);
                });

                marker.on('popupclose', () => {
                    deselectPlaceCards();
                });

                activeMarkers[p.id] = marker;
            });
        }

        // Render Cards in Sidebar
        function renderPlaces() {
            const container = document.getElementById('places-list');
            container.innerHTML = '';

            const filtered = places.filter(p => {
                const matchesTab = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = p.nameZh.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      p.nameEs.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                      p.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTab && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; opacity: 0.6; font-size: 14px;">
                        没有找到匹配的去处。
                    </div>
                `;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('article');
                card.className = `place-card`;
                card.id = `card-${p.id}`;
                card.onclick = () => selectPlaceCard(p.id, true);

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <h2 class="place-title">${p.nameZh}</h2>
                            <div class="place-es">${p.nameEs}</div>
                        </div>
                        <span class="tag tag-${p.category}">${p.categoryZh}</span>
                    </div>
                    <p class="place-desc">${p.description}</p>
                    
                    <div class="place-meta-item">
                        <span class="meta-icon" aria-hidden="true">🕒</span>
                        <span>时间: ${p.hours}</span>
                    </div>
                    <div class="place-meta-item">
                        <span class="meta-icon" aria-hidden="true">💡</span>
                        <span>贴士: ${p.tips}</span>
                    </div>
                    
                    <a href="${p.gmaps}" target="_blank" class="gmaps-btn" id="card-gmaps-${p.id}" onclick="event.stopPropagation();">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        在 Google Maps 导航
                    </a>
                `;

                container.appendChild(card);
            });

            // Re-create markers based on filtered list
            createMarkers();
        }

        // Selection Handlers
        function selectPlaceCard(id, panTo = true) {
            deselectPlaceCards();

            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.classList.add('selected');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Highlight Marker
            const pin = document.getElementById(`pin-${id}`);
            if (pin) pin.classList.add('selected');

            // Pan Map and Open Popup
            const place = places.find(p => p.id === id);
            const marker = activeMarkers[id];
            
            if (place && marker) {
                if (panTo) {
                    map.flyTo([place.lat, place.lng], 13, {
                        duration: 1.2
                    });
                    setTimeout(() => {
                        marker.openPopup();
                    }, 1000);
                }
            }

            // Close sidebar on mobile after clicking
            if (window.innerWidth <= 768 && panTo) {
                toggleSidebar(false);
            }
        }

        function deselectPlaceCards() {
            document.querySelectorAll('.place-card').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.custom-pin').forEach(p => p.classList.remove('selected'));
        }

        // Filters
        function filterCategory(cat, btn) {
            currentFilter = cat;
            
            // Toggle active class on tabs
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            renderPlaces();
        }

        function handleSearch(val) {
            searchQuery = val;
            renderPlaces();
        }

        // Theme Toggle Logic
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            setTheme(newTheme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('meta[name="color-scheme"]').content = theme;
            localStorage.setItem("color-scheme", theme);
            
            // Switch Map Tile Layer
            if (theme === 'dark') {
                map.removeLayer(lightTileLayer);
                darkTileLayer.addTo(map);
            } else {
                map.removeLayer(darkTileLayer);
                lightTileLayer.addTo(map);
            }
            
            updateThemeIcon(theme);
        }

        function initThemeIcon() {
            const theme = document.documentElement.getAttribute('data-theme') || 'light';
            updateThemeIcon(theme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') {
                // Moon svg content
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            } else {
                // Sun svg content
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }

        // Mobile Sidebar Toggle
        function toggleSidebar(forceState = null) {
            const sidebar = document.getElementById('sidebar');
            const btnText = document.querySelector('#mobile-toggle span');
            
            const isOpen = sidebar.classList.contains('open');
            const nextState = forceState !== null ? forceState : !isOpen;

            if (nextState) {
                sidebar.classList.add('open');
                btnText.textContent = '收起列表';
            } else {
                sidebar.classList.remove('open');
                btnText.textContent = '查看列表';
            }
        }
    </script>
</body>
</html>
